name: CIO Analysis Engine

on:
  # 手動実行用：GitHubの「Actions」タブからボタン一つで起動
  workflow_dispatch:
    inputs:
      ticker:
        description: '分析する銘柄コード (例: 7203.T)'
        required: true
        default: '7203.T'

  # 定期実行用（例：平日の日本時間16:00、市場が閉まった後）
  # schedule:
  #   - cron: '0 7 * * 1-5'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Analysis
        env:
          # GitHubのSettings > Secrets に登録した鍵を環境変数に渡す
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          # サービスアカウントのJSONを環境変数として渡す
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          # 銘柄コードを引数としてPythonを実行
          python main.py --ticker "${{ github.event.inputs.ticker }}"